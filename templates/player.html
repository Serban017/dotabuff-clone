<!DOCTYPE html>
<html>
<head>
    <title>Match History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
    <h1>Match History</h1>
    <table class="table table-dark table-striped">
        <thead>
            <tr>
                <th>Match ID</th>
                <th>Hero</th>
                <th>Team</th>
                <th>KDA</th>
                <th>Result</th>
            </tr>
        </thead>
        <tbody>
            {% for match in matches %}
            <tr>
                <td>{{ match.match_id }}</td>
                <td>{{ hero_table[match.hero_id] }}</td>
                <td class="{% if match.player_slot <= 4 %}text-success{% else %}text-danger{% endif %}">{% if match.player_slot <= 4 %}Radiant{% else %}Dire{% endif %}</td>
                <td>{{ match.kills }}/{{ match.deaths }}/{{ match.assists }}</td>
                <td class="{% if match.result == 'WIN' %}text-success{% else %}text-danger{% endif %}">{{ match.result }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>


</body>
</html>
